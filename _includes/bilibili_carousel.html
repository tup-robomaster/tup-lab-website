<div class="bili-carousel-container" id="bilibili-carousel">
  <button class="bili-arrow left" aria-label="Previous">&lt;</button>
  
  <div class="bili-carousel-viewport">
    <div class="bili-covers-wrapper" id="bili-covers">
      {% for v in site.data.bilibili_videos %}
        <div class="bili-cover" data-idx="{{ forloop.index0 }}" title="{{ v.title | escape }}">
          <img src="{{ '/more/video_cover/' | append: v.bvid | append: '.jpg' | relative_url }}" loading="lazy" decoding="async" alt="{{ v.title | escape }}">
          <div class="bili-title">{{ v.title }}</div>
        </div>
      {% endfor %}
    </div>
  </div>

  <button class="bili-arrow right" aria-label="Next">&gt;</button>
  
  <div class="bili-dots" id="bili-dots">
    {% for v in site.data.bilibili_videos %}
      <span class="bili-dot" data-idx="{{ forloop.index0 }}"></span>
    {% endfor %}
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('bilibili-carousel');
  if (!container) return;

  const covers = container.querySelectorAll('.bili-cover');
  const dots = container.querySelectorAll('.bili-dot');
  const total = covers.length;
  let currentIdx = 0;
  let autoplayTimer = null;

  const bvidMap = [
    {% for v in site.data.bilibili_videos %}
      "{{ v.bvid }}"{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  function updateCarousel(newIdx) {
    currentIdx = (newIdx + total) % total;
    
    covers.forEach((cover, i) => {
      cover.classList.remove('active', 'prev', 'next', 'far-prev', 'far-next');
      
      let pos = i - currentIdx;
      // Handle wrapping
      if (pos < -Math.floor(total/2)) pos += total;
      if (pos > Math.floor(total/2)) pos -= total;

      if (pos === 0) {
        cover.classList.add('active');
      } else if (pos === -1) {
        cover.classList.add('prev');
      } else if (pos === 1) {
        cover.classList.add('next');
      } else if (pos < -1) {
        cover.classList.add('far-prev');
      } else if (pos > 1) {
        cover.classList.add('far-next');
      }
    });

    dots.forEach((dot, i) => {
      dot.classList.toggle('active', i === currentIdx);
    });
  }

  // Click events
  container.querySelector('.bili-arrow.left').onclick = () => {
    stopAutoplay();
    updateCarousel(currentIdx - 1);
    startAutoplay();
  };
  container.querySelector('.bili-arrow.right').onclick = () => {
    stopAutoplay();
    updateCarousel(currentIdx + 1);
    startAutoplay();
  };

  covers.forEach((cover, i) => {
    cover.onclick = () => {
      if (i === currentIdx) {
        window.open(`https://www.bilibili.com/video/${bvidMap[i]}`, '_blank');
      } else {
        stopAutoplay();
        updateCarousel(i);
        startAutoplay();
      }
    };
  });

  dots.forEach((dot, i) => {
    dot.onclick = () => {
      stopAutoplay();
      updateCarousel(i);
      startAutoplay();
    };
  });

  // Autoplay
  function startAutoplay() {
    autoplayTimer = setInterval(() => updateCarousel(currentIdx + 1), 6000);
  }
  function stopAutoplay() {
    clearInterval(autoplayTimer);
  }

  // Touch Support
  let touchStartX = 0;
  container.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  container.addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      stopAutoplay();
      updateCarousel(currentIdx + (diff > 0 ? 1 : -1));
      startAutoplay();
    }
  }, { passive: true });

  // Init
  updateCarousel(0);
  startAutoplay();

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') {
      stopAutoplay();
      updateCarousel(currentIdx - 1);
      startAutoplay();
    } else if (e.key === 'ArrowRight') {
      stopAutoplay();
      updateCarousel(currentIdx + 1);
      startAutoplay();
    }
  });
})();
</script>
